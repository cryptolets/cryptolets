# Sweep parameters for Short Weierstrass Point Addition
BITWIDTH: [64, 96, 128, 192, 254, 255, 256, 377, 381, 384, 448, 511, 512, 521, 753, 768]
# 64, 96, 128, 192, 254, 255, 256, 377, 381, 384, 448, 511, 512, 521, 753, 768

WBW: [16, 32, 64, 128]
TECH_TYPE: [gf12]  # gf12 45nm saed32 fpga fpgahbm fpgahbmvhk158
TARGET_II: [1]
TARGET_PERIOD: [1]  # in ns
MUL_TYPE: [MUL_SCHOOLBOOK, MUL_KARATSUBA] # MUL_NORMAL, MUL_SCHOOLBOOK, MUL_KARATSUBA
Q_TYPE: [FIXED_Q, VAR_Q] # VAR_Q, FIXED_Q
CURVE_PARAMS_TYPE: [FIXED_CURVE_PARAMS, VAR_CURVE_PARAMS] # FIXED_CURVE_PARAMS, VAR_CURVE_PARAMS

# curve types: 
# RAND_CURVE
# a=0 : BN254, BLS12_377, BLS12_381, SECP256K1
# a=2 : MNT4753
# a=-3 : P_256, P_521
CURVE_TYPE: [RAND_CURVE, BN254, P_256, SECP256K1, BLS12_377, BLS12_381, P_521, MNT4753]

PREC_TYPE: [SINGLE_PREC]  # SINGLE_PREC, MULTI_PREC
CCORE_PERIOD_RATIO: [1]

# for RAND_CURVE can select what "a" to pick which will specify what formula will be used
# for other CURVE_TYPE's this value will be overrided
FIELD_A: [A0, A2, ANEG3, AVAR] # A0: a=0, A2: a=2, ANEG3: a=-3, AVAR: variable a

BASE_MUL_WIDTH:
  8: [8]
  12: [12]
  16: [16]
  24: [24]
  32: [32]
  48: [48]
  64: [64]
  96: [48]
  128: [64]
  192: [48]
  254: [63]
  255: [63]
  256: [64]
  377: [47]
  381: [47]
  384: [48]
  448: [56]
  511: [63]
  512: [64]
  521: [65]
  753: [47]
  768: [48]
  1024: [64]

KAR_BASE_MUL_WIDTH:
  8: [8]
  12: [12]
  16: [16]
  24: [12]
  32: [16]
  48: [24]
  64: [32]
  96: [48, 24]
  128: [64, 32]
  192: [96, 48]
  254: [127, 63]
  255: [127, 63]
  256: [128, 64]
  377: [188, 94, 47]
  381: [190, 95, 47]
  384: [192, 96, 48]
  448: [224, 112, 56]
  511: [255, 127, 63]
  512: [256, 128, 64]
  521: [260, 130, 65]
  753: [376, 188, 94, 47]
  768: [384, 192, 96, 48]
  1024: [512, 256, 128, 64]

# Control flags
SIM: true           # verify RTL
SYN: false
TEST: true          # test C++ code
TEST_ONLY: false    # only test C++ code with osci
NUM_TEST_SAMPLES: 1000
CCORE_MUL_F: false  # make mul_f ccore, false = more compile time, better design latency
CCORE_MODADDSUB: false # make modadd,modsub,moddouble ccore, false = more compile time, better design latency
CCORE_MODMUL: true

# Defines order of params before project split
SWEEP_ORDER: [
  CURVE_TYPE, FIELD_A, CURVE_PARAMS_TYPE, Q_TYPE, PREC_TYPE, TECH_TYPE, 
  TARGET_PERIOD, TARGET_II, MUL_TYPE, CCORE_PERIOD_RATIO,
  BITWIDTH, WBW, BASE_MUL_WIDTH, KAR_BASE_MUL_WIDTH
  ]
