# Sweep parameters
BITWIDTH: [64, 128, 256]
WBW: [32, 64]
TECH_TYPE: [gf12]  # gf12 45nm saed32 fpga fpgahbm fpgahbmvhk158
TARGET_II: [1]
TARGET_PERIOD: [1.1]  # in ns
Q_TYPE: [VAR_Q, FIXED_Q] # VAR_Q, FIXED_Q
CURVE_TYPE: [BN254]
PREC_TYPE: [SINGLE_PREC, MULTI_PREC]  # SINGLE_PREC, MULTI_PREC

# Control flags
SIM: true           # verify RTL
SYN: false
TEST: true          # test C++ code
TEST_ONLY: false    # only test C++ code with osci
NUM_TEST_SAMPLES: 1000
GEN_SAMPLES: true   # off if custom samples
CCORE_TOP: false    # cannot be true when SIM or TEST are true

# Defines order of params before project split
SWEEP_ORDER: [PREC_TYPE, CURVE_TYPE, Q_TYPE, TECH_TYPE, TARGET_PERIOD, TARGET_II, BITWIDTH, WBW]
