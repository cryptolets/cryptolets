# Sweep parameters
BITWIDTH: [128, 192, 254, 381]
WBW: [16, 32, 64, 128] # Word Bitwidth for multi-prec
TECH_TYPE: [gf12]  # gf12 45nm saed32 fpga_vu9p fpga_hbmvh1782 fpga_hbmvh1582
TARGET_II: [1]
TARGET_PERIOD: [1]  # in ns
PREC_TYPE: [SINGLE_PREC, MULTI_PREC]  # SINGLE_PREC, MULTI_PREC
CMUL_TYPE: [CMUL_NORMAL] # CMUL_NORMAL, CMUL_NAF, CMUL_SA

# Control flags
SIM: true           # verify RTL
SYN: false
TEST: true          # test C++ code
TEST_ONLY: false    # only test C++ code with osci
NUM_TEST_SAMPLES: 1000
CCORE_TOP: true    # cannot be true when SIM or TEST are true
USE_CLUSTERS: true # use use carry save adder for adder trees

# Defines order of params before project split
SWEEP_ORDER: [TECH_TYPE, PREC_TYPE, CMUL_TYPE, TARGET_PERIOD, TARGET_II, BITWIDTH, WBW]
