# Control flags
SIM: true           # verify RTL
SYN: false
TEST: true          # test C++ code
TEST_ONLY: false    # only test C++ code with osci
NUM_TEST_SAMPLES: 10000
CCORE_TOP: true
CCORE_MUL_F: false  # make mul_f ccore, false = more compile time, better design latency
CCORE_CMUL: true  # this needs to be true, other wise some adder trees get turned into sequential adds, massively hurting latency
USE_CLUSTERS: true # use use carry save adder for adder trees

# Defines order of params before project split
SWEEP_ORDER: [
  TECH_TYPE, MUL_SQ, CURVE_TYPE, REDC_TYPE, Q_TYPE, PREC_TYPE,
  TARGET_PERIOD, TARGET_II, MUL_TYPE, CMUL_TYPE, CCORE_PERIOD_RATIO,
  BITWIDTH, WBW, BASE_MUL_WIDTH, KAR_BASE_MUL_WIDTH
  ]
