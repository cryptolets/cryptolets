# Sweep parameters
BITWIDTH: [64, 128]
TECH_TYPE: [gf12]  # gf12 45nm saed32 fpga_vu9p fpga_hbmvh1782 fpga_hbmvh1582
TARGET_II: [1]
TARGET_PERIOD: [1, 2]  # in ns
BITSHIFT_DIRECTION: [BITSHIFT_LEFT, BITSHIFT_RIGHT] # BITSHIFT_LEFT, BITSHIFT_RIGHT

# Control flags
SIM: true           # verify RTL
SYN: false
TEST: true          # test C++ code
TEST_ONLY: false    # only test C++ code with osci
NUM_TEST_SAMPLES: 1000
CCORE_TOP: false    # cannot be true when SIM or TEST are true

# Defines order of params before project split
SWEEP_ORDER: [TECH_TYPE, TARGET_PERIOD, TARGET_II, BITSHIFT_DIRECTION, BITWIDTH]
