# Sweep parameters
BITWIDTH: [16, 32, 64]
LIMBS: [2, 4]
TECH_TYPE: [45nm]  # gf12 45nm saed32 fpga fpgahbm fpgahbmvhk158
TARGET_II: [1]
TARGET_PERIOD: [1]  # in ns
PREC_TYPE: [SINGLE_PREC]  # SINGLE_PREC, MULTI_PREC

# Control flags
SIM: true           # verify RTL
SYN: true
TEST: true          # test C++ code
TEST_ONLY: false    # only test C++ code with osci
NUM_TEST_SAMPLES: 1000
GEN_SAMPLES: true   # off if custom samples
CCORE_TOP: false    # cannot be true when SIM or TEST are true

# Defines order of params before project split
SWEEP_ORDER: [PREC_TYPE, TECH_TYPE, TARGET_PERIOD, TARGET_II, BITWIDTH, LIMBS]
