# Maps parameter names and values to short forms for sweep naming.
# Used by naming_short.py for encoding/decoding filenames and directories.

SHORT_KEY:
  BITWIDTH: bw
  TARGET_II: ii
  TARGET_PERIOD: p
  MUL_TYPE: mt
  Q_TYPE: qt
  KAR_BASE_MUL_WIDTH: kar
  BASE_MUL_WIDTH: bm
  TECH_TYPE: tt
  CURVE_TYPE: ct
  FIELD_A: fa
  PREC_TYPE: pt
  LIMBS: l
  CCORE_PERIOD_RATIO: cpr
  
MED_KEY:
  BITWIDTH: bitwidth
  TARGET_II: ii
  TARGET_PERIOD: target_period
  MUL_TYPE: mul_type
  Q_TYPE: q_type
  KAR_BASE_MUL_WIDTH: kar
  BASE_MUL_WIDTH: bm
  TECH_TYPE: tech_type
  CURVE_TYPE: curve_type
  FIELD_A: a
  PREC_TYPE: prec_type
  LIMBS: limbs
  CCORE_PERIOD_RATIO: cpr

VALUE:
  MUL_TYPE:
    MUL_NORMAL: nor
    MUL_KARATSUBA: kar
    MUL_SCHOOLBOOK: sb
  Q_TYPE:
    FIXED_Q: fixedq
    VAR_Q: varq
  FIELD_A:
    AVAR: var
    AN1: n1
    AN3: n3
    A0: "0"
  PREC_TYPE:
    SINGLE_PREC: sp
    MULTI_PREC: mp
